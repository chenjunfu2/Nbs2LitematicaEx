name: C/C++ CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Setup GCC
      if: matrix.compiler == 'gcc'
      uses: egor-tensin/setup-gcc@v1
      with:
        version: latest

    - name: Setup Clang
      if: matrix.compiler == 'clang'
      uses: egor-tensin/setup-clang@v1
      with:
        version: latest

    - name: Configure with CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build

    - name: List build directory
      run: find build -type f | sort

    - name: Collect artifacts
      run: |
        mkdir -p artifacts
        if [ -f "build/LitematicGenerator/LitematicGenerator" ]; then
          cp build/LitematicGenerator/LitematicGenerator artifacts/
        else
          find build -type f -executable -exec file {} \; | grep ELF | cut -d: -f1 | xargs -I {} cp {} artifacts/
        fi
        echo "Collected artifacts:"
        ls -la artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: myprogram-${{ matrix.compiler }}
        path: artifacts/
